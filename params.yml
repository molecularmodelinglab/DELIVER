# DELIVER pipeline parameters
# This is the only file you need to edit before running the pipeline.
#
# The pipeline detects the run mode automatically:
#   read_1 set → FASTQ input (preprocess → DELi → postprocessing)
#   counts_file set   → counts.parquet input (postprocessing only)
#
# Usage:
#   sbatch submit.slurm --deliver-dir DIR --work-dir DIR --params-file FILE --log-dir DIR
#   Add --resume to resume after failure

# -----------------------------------------------------------------------
# INPUT — change for every run
# -----------------------------------------------------------------------

# read_1: sequencing file(s) for read 1 (one or more lanes, .fastq or .fastq.gz)
# read_2: sequencing file(s) for read 2 — paired-end only; omit or set null for single-end
#         Set read_1/read_2 OR counts_file, not both.
read_1:
  - "/path/to/sample_L001_R1.fastq.gz"
  - "/path/to/sample_L002_R1.fastq.gz"
read_2:
  - "/path/to/sample_L001_R2.fastq.gz"
  - "/path/to/sample_L002_R2.fastq.gz"

# out_dir: directory where all results will be written
out_dir: "/path/to/results"

# counts_file: path to a pre-computed counts.parquet — skips decoding entirely,
#              runs postprocessing only. Set instead of read_1/read_2.
counts_file: null

# deli_data_dir: path to the DELi data directory containing library definitions,
#                building block tables, etc. (see DELi docs for structure)
deli_data_dir: "/path/to/deli_data"

# -----------------------------------------------------------------------
# SELECTION METADATA — written into the generated decode.yaml and used to
# name output files. Fill in for every run.
# -----------------------------------------------------------------------

# selection_id: short identifier for this selection experiment
#               (used as prefix for all output files)
selection_id: "my_selection"

# target_id: name of the target protein
target_id: "my_target"

# selection_condition: free-text description of selection conditions (e.g. "10nM", "-")
selection_condition: "-"

# date_ran: date the selection was run (YYYY-MM-DD)
date_ran: "2024-01-01"

# additional_info: any extra notes to store in the decode.yaml
additional_info: ""

# libraries: list of library IDs to decode against.
#            Must match library names in deli_data_dir.
libraries:
  - "L01"
  - "L02"

# -----------------------------------------------------------------------
# DECODE SETTINGS — defaults work for most cases; change only if needed
# -----------------------------------------------------------------------

# library_error_tolerance: max number of mismatches allowed when matching a library barcode
library_error_tolerance: 2

# min_library_overlap: minimum number of bases that must overlap between read and barcode
min_library_overlap: 8

# revcomp: whether to reverse-complement reads before decoding ("YES" / "NO")
revcomp: "YES"

# demultiplexer_algorithm: algorithm used to find barcode sections ("regex" or "cutadapt")
demultiplexer_algorithm: "regex"

# demultiplexer_mode: "single" (one library per read) or "library" (split by library tag)
demultiplexer_mode: "single"

# realign: whether to realign reads after initial barcode calling ("YES" / "NO")
realign: "NO"

# wiggle: allow 1-base wiggle room when locating barcode sections ("YES" / "NO")
wiggle: "YES"

# -----------------------------------------------------------------------
# DELi SETUP — set once after cloning, do not change between runs
# -----------------------------------------------------------------------

# deli_dir: path to the DELi repository — used by setup.sh to install DELi into .venv
deli_dir: "/path/to/DELi"

# chunk_size: number of reads per FASTQ chunk sent to each decode job
chunk_size: 1000000

# prefix: output file prefix — defaults to selection_id if empty
prefix: ""

# debug: enable DELi debug logging
debug: false

# config_file: optional path to a custom DELi config file
# config_file: null
